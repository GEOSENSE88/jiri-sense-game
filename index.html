<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#B6EAFD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="지리SENSE">
<title>지리SENSE GAME — 수능 한국지리 백지도 경쟁 퀴즈</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== 홈 화면 ===== -->
<div id="screen-home" class="screen active">
  <header class="home-header">
    <img src="icon-192.png" alt="지리SENSE" class="app-logo">
    <h1>지리SENSE GAME</h1>
    <p class="subtitle">수능특강 · 수능완성 · 5개년 기출 빈도 기반 — 한국지리 백지도 경쟁 퀴즈</p>
  </header>

  <div class="home-grid">
    <section class="panel modes-panel">
      <h2>게임 모드</h2>
      <div class="mode-cards">
        <button class="mode-card" data-mode="explore">
          <span class="mode-icon">🔍</span><span class="mode-name">백지도 탐색</span>
          <span class="mode-desc">시·도와 100개 지점을 지도에서 익히는 학습 모드</span>
        </button>
        <button class="mode-card" data-mode="location">
          <span class="mode-icon">📍</span><span class="mode-name">위치 사냥</span>
          <span class="mode-desc">제시된 지역이 속한 시·군을 백지도에서 탭!</span>
        </button>
        <button class="mode-card" data-mode="muniname">
          <span class="mode-icon">🔎</span><span class="mode-name">지역 판독</span>
          <span class="mode-desc">지도에 표시된 시·군의 이름을 맞혀라</span>
        </button>
        <button class="mode-card" data-mode="mascot">
          <span class="mode-icon">🐯</span><span class="mode-name">마스코트 찾기</span>
          <span class="mode-desc">한우리·빛돌이·고마곰… 마스코트의 고장을 탭!</span>
        </button>
        <button class="mode-card" data-mode="province">
          <span class="mode-icon">🧩</span><span class="mode-name">시·도 클릭</span>
          <span class="mode-desc">설명에 해당하는 시·도를 찾아 탭</span>
        </button>
        <button class="mode-card" data-mode="climate">
          <span class="mode-icon">🌡️</span><span class="mode-name">기후 비교</span>
          <span class="mode-desc">지도의 A~C와 기후 자료 (가)~(다) 매칭 — 위치 기반 상대 비교</span>
        </button>
        <button class="mode-card" data-mode="stats">
          <span class="mode-icon">📊</span><span class="mode-name">통계 비교</span>
          <span class="mode-desc">세 시·도와 통계청 자료 매칭 — 산업·인구의 지역 차 읽기</span>
        </button>
        <button class="mode-card" data-mode="mcq">
          <span class="mode-icon">📝</span><span class="mode-name">개념 퀴즈</span>
          <span class="mode-desc">수능특강+수능완성 4지선다 (150여 문항)</span>
        </button>
        <button class="mode-card" data-mode="ox">
          <span class="mode-icon">⚡</span><span class="mode-name">스피드 OX</span>
          <span class="mode-desc">60초 타임어택! 빠르게 O/X 판단</span>
        </button>
        <button class="mode-card battle" data-mode="battle">
          <span class="mode-icon">⚔️</span><span class="mode-name">1:1 배틀</span>
          <span class="mode-desc">친구와 번갈아 풀며 점수 대결 (혼합 출제)</span>
        </button>
      </div>

      <div class="region-filter">
        <h3>출제 범위</h3>
        <div id="region-chips" class="chips"></div>
      </div>
    </section>

    <section class="panel side-panel">
      <div class="profile-box">
        <h2>내 계급</h2>
        <div id="rank-badge" class="rank-badge"></div>
        <div id="xp-bar-wrap" class="xp-bar-wrap"><div id="xp-bar"></div></div>
        <div id="xp-text" class="xp-text"></div>
      </div>
      <div class="mastery-box">
        <h2>지역별 숙련도</h2>
        <div id="mastery-list"></div>
      </div>
      <div class="freq-box">
        <h2>🔥 5개년 기출 빈출 지역</h2>
        <p id="freq-span" class="freq-span"></p>
        <div id="freq-list"></div>
      </div>
      <div class="board-box">
        <h2>🏆 명예의 전당</h2>
        <div id="home-board"></div>
        <button id="reset-data" class="text-btn">기록 초기화</button>
      </div>
    </section>
  </div>
  <footer class="credit">제작: <b>산남고 이성훈</b> · 자료: 2027 EBS 수능특강·수능완성, 기상청 평년값, 통계청 · 지도: 통계청 행정구역</footer>
</div>

<!-- ===== 게임 화면 ===== -->
<div id="screen-game" class="screen">
  <div class="game-top">
    <button id="btn-quit" class="text-btn">← 나가기</button>
    <div id="game-title" class="game-title"></div>
    <div id="turn-indicator" class="turn-indicator hidden"></div>
    <div class="hud">
      <div class="hud-item">문제 <span id="hud-qnum">1</span>/<span id="hud-qtotal">10</span></div>
      <div class="hud-item">콤보 <span id="hud-combo">0</span>🔥</div>
      <div class="hud-item score">점수 <span id="hud-score">0</span></div>
    </div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>

  <div class="game-body" id="game-body">
    <div id="question-box" class="question-box"></div>
    <div id="map-pane" class="map-pane">
      <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="zoom-ctrl">
        <button id="zoom-in" aria-label="확대">＋</button>
        <button id="zoom-out" aria-label="축소">－</button>
        <button id="zoom-reset" aria-label="원래대로">⟳</button>
      </div>
      <div id="map-tooltip" class="map-tooltip hidden"></div>
    </div>
    <div id="quiz-pane" class="quiz-pane">
      <div id="choices-box" class="choices-box"></div>
      <div id="feedback-box" class="feedback-box hidden"></div>
      <button id="btn-next" class="primary-btn hidden">다음 ▶</button>
    </div>
  </div>
</div>

<!-- ===== 결과 화면 ===== -->
<div id="screen-result" class="screen">
  <div class="result-card">
    <h1 id="result-title">결과</h1>
    <div id="result-main"></div>
    <div id="result-detail"></div>
    <div id="name-entry" class="name-entry hidden">
      <input id="player-name" maxlength="10" placeholder="이름 입력 (랭킹 등록)">
      <button id="btn-save-score" class="primary-btn">등록</button>
    </div>
    <div class="result-actions">
      <button id="btn-retry" class="primary-btn">다시 도전</button>
      <button id="btn-home" class="ghost-btn">홈으로</button>
    </div>
    <div class="credit" style="padding-bottom:0;margin-top:18px">지리SENSE GAME · 제작: <b>산남고 이성훈</b></div>
  </div>
</div>

<script src="map-data.js"></script>
<script src="stats-data.js"></script>
<script src="freq-data.js"></script>
<script src="match-sets.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
</body>
</html>
