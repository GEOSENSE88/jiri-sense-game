## /etc/nginx/sites-available/sannam_game
## game.26sannam3.site — 지리SENSE GAME (정적 사이트)

# HTTP → HTTPS (Let's Encrypt 갱신 챌린지만 예외)
server {
    listen 80;
    server_name game.26sannam3.site;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name game.26sannam3.site;

    ssl_certificate     /etc/letsencrypt/live/game.26sannam3.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.26sannam3.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/game_jirisense;
    index index.html;

    # 캐시 정책: 코드·마크업은 항상 최신 확인(업데이트 즉시 반영), 이미지·아이콘은 장기 캐시
    location = / { add_header Cache-Control "no-cache"; try_files /index.html =404; }
    location ~* \.(?:js|css|json|html)$ { add_header Cache-Control "no-cache"; }
    location ~* \.(?:png|ico|jpe?g|webp|svg|woff2?)$ { add_header Cache-Control "public, max-age=86400"; }

    # 공유 명예의 전당 API (Flask + Gunicorn)
    location ^~ /api/ {
        proxy_pass http://unix:/run/game_api/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
